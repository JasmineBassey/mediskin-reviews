name: Update Google reviews

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get the files
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ask Google for the latest numbers
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PLACE_ID: ${{ secrets.PLACE_ID }}
        run: node fetch-reviews.js

      - name: Save the new numbers
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add reviews-meta.json
          git diff --staged --quiet || git commit -m "Update Google review stats"
          git push